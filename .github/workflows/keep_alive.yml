name: Keep Alive (Supabase + Railway)

on:
  schedule:
    # Supabase: 1x/dia (evita pausa por inatividade no free tier)
    - cron: "0 9 * * *"
    # Railway: a cada 14 min (sleepApplication no railway.json)
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  supabase:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase (RPC keepalive) com retry
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEEPALIVE_RPC: ${{ secrets.SUPABASE_KEEPALIVE_RPC }}
        run: |
          set -euo pipefail

          HEADERS=(
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}"
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}"
            -H "Content-Type: application/json"
          )

          rpc_candidates=()
          if [ -n "${SUPABASE_KEEPALIVE_RPC:-}" ]; then
            rpc_candidates+=("${SUPABASE_KEEPALIVE_RPC}")
          fi
          rpc_candidates+=("keepalive" "rpc_keepalive")

          max_attempts=3
          sleep_seconds=12
          success=0
          response=""

          for rpc_name in "${rpc_candidates[@]}"; do
            URL="${SUPABASE_URL}/rest/v1/rpc/${rpc_name}"
            echo "Testando RPC: ${rpc_name}"

            attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Tentativa ${attempt}/${max_attempts} em ${rpc_name}..."

              response="$(curl -sS --fail-with-body -X POST "$URL" "${HEADERS[@]}" -d '{}')" && break

              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Falhou, aguardando ${sleep_seconds}s para tentar novamente..."
                sleep "$sleep_seconds"
              fi

              attempt=$((attempt + 1))
            done

            if [ "${response:-}" = "\"ok\"" ] || [ "${response:-}" = "ok" ]; then
              success=1
              echo "Keep alive Supabase OK via '${rpc_name}'. Resposta: ${response}"
              break
            fi

            echo "RPC '${rpc_name}' não retornou sucesso. Resposta: ${response:-<vazia>}"
            response=""
          done

          if [ "$success" -ne 1 ]; then
            echo "Nenhuma RPC de keepalive respondeu com sucesso."
            exit 1
          fi

  railway:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/14 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping API Railway (GET /health)
        env:
          API_PUBLIC_URL: ${{ secrets.API_PUBLIC_URL }}
        run: |
          set -euo pipefail

          if [ -z "${API_PUBLIC_URL:-}" ]; then
            echo "Secret API_PUBLIC_URL não configurado — pulando ping do Railway."
            exit 0
          fi

          base="${API_PUBLIC_URL%/}"
          url="${base}/health"
          max_attempts=3
          sleep_seconds=15
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Tentativa ${attempt}/${max_attempts} em ${url}..."

            http_code="$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 90 "${url}")"
            body="$(cat /tmp/health.json)"

            if [ "$http_code" = "200" ] && echo "$body" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              echo "Keep alive Railway OK. HTTP ${http_code} — ${body}"
              exit 0
            fi

            echo "Resposta inesperada: HTTP ${http_code} — ${body}"

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Aguardando ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi

            attempt=$((attempt + 1))
          done

          echo "Falha ao acordar a API no Railway."
          exit 1
