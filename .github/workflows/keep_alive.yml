name: Supabase Keep Alive

on:
  schedule:
    # Todo dia às 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Supabase (RPC keepalive) com retry
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEEPALIVE_RPC: ${{ secrets.SUPABASE_KEEPALIVE_RPC }}
        run: |
          set -euo pipefail

          HEADERS=(
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}"
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}"
            -H "Content-Type: application/json"
          )

          # Permite configurar o nome da RPC por secret, com fallback para nomes comuns.
          rpc_candidates=()
          if [ -n "${SUPABASE_KEEPALIVE_RPC:-}" ]; then
            rpc_candidates+=("${SUPABASE_KEEPALIVE_RPC}")
          fi
          rpc_candidates+=("keepalive" "rpc_keepalive")

          max_attempts=3
          sleep_seconds=12
          success=0
          response=""

          for rpc_name in "${rpc_candidates[@]}"; do
            URL="${SUPABASE_URL}/rest/v1/rpc/${rpc_name}"
            echo "Testando RPC: ${rpc_name}"

            attempt=1
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Tentativa ${attempt}/${max_attempts} em ${rpc_name}..."

              response="$(curl -sS --fail-with-body -X POST "$URL" "${HEADERS[@]}" -d '{}')" && break

              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "Falhou, aguardando ${sleep_seconds}s para tentar novamente..."
                sleep "$sleep_seconds"
              fi

              attempt=$((attempt + 1))
            done

            if [ "${response:-}" = "\"ok\"" ] || [ "${response:-}" = "ok" ]; then
              success=1
              echo "Keep alive executado com sucesso via '${rpc_name}'. Resposta: ${response}"
              break
            fi

            echo "RPC '${rpc_name}' não retornou sucesso. Resposta: ${response:-<vazia>}"
            response=""
          done

          if [ "$success" -ne 1 ]; then
            echo "Nenhuma RPC de keepalive respondeu com sucesso."
            exit 1
          fi
